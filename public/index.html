<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Studio | Modern Generator</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="toast-container"></div>

    <main class="app-container">
      <header class="header">
        <h1>QR Studio</h1>
        <p>QR generation for PNG & SVG</p>
      </header>

      <section class="main-content">
        <div class="input-group">
          <label for="urlInput" class="label">Link or text</label>
          <input
            type="text"
            id="urlInput"
            placeholder="https://example.com"
            class="input-field"
            autocomplete="off"
          />
        </div>

        <button id="generateBtn" class="btn-generate">Generate QR Code</button>

        <div id="resultArea" class="result-area">
          <div class="preview-card">
            <img id="qrPreview" src="" alt="QR Preview" />
          </div>

          <div class="download-grid">
            <button id="downloadPng" class="btn-download">
              <span class="format-label">Raster</span>
              <span class="format-ext">PNG</span>
            </button>

            <button id="downloadSvg" class="btn-download">
              <span class="format-label">Vector</span>
              <span class="format-ext">SVG</span>
            </button>
          </div>
        </div>
      </section>

      <footer class="footer">QR Studio • 2026 • Crafted with passion</footer>
    </main>

    <!-- Custom Logic -->
    <script src="js/app.js"></script>
  </body>
</html>
