<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Studio | PNG & SVG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border border-white">
        <div class="gradient-bg p-8 text-white text-center">
            <h1 class="text-3xl font-bold mb-2">QR Studio</h1>
            <p class="text-indigo-100 text-sm opacity-90">Генерація QR-кодів : PNG та SVG</p>
        </div>

        <div class="p-8">
            <div class="space-y-5">
                <div>
                    <label for="urlInput" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Ссылка или текст</label>
                    <input 
                        type="text" 
                        id="urlInput" 
                        placeholder="https://example.com" 
                        class="w-full px-4 py-4 rounded-2xl border border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all text-slate-700 bg-slate-50"
                    >
                </div>

                <button 
                    onclick="generateQR()" 
                    id="btn"
                    class="w-full gradient-bg hover:opacity-90 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-200 active:scale-[0.98]"
                >
                    Сгенерировать код
                </button>
            </div>

            <div id="resultContainer" class="mt-10 hidden space-y-8 animate-in fade-in duration-500">
                
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                    <div class="relative p-6 bg-white rounded-2xl border border-slate-100 flex justify-center shadow-inner">
                        <img id="qrPreview" src="" alt="QR Preview" class="w-48 h-48 rounded-lg">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="downloadFile('png')" class="group flex flex-col items-center justify-center p-4 bg-slate-50 border border-slate-200 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 transition-all">
                        <span class="text-[10px] font-black text-slate-400 uppercase mb-1">Растр</span>
                        <span class="text-indigo-600 font-bold text-xl uppercase tracking-tighter group-hover:scale-110 transition-transform">PNG</span>
                    </button>

                    <button onclick="downloadFile('svg')" class="group flex flex-col items-center justify-center p-4 bg-slate-50 border border-slate-200 rounded-2xl hover:border-emerald-500 hover:bg-emerald-50 transition-all">
                        <span class="text-[10px] font-black text-slate-400 uppercase mb-1">Вектор</span>
                        <span class="text-emerald-600 font-bold text-xl uppercase tracking-tighter group-hover:scale-110 transition-transform">SVG</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 py-4 px-8 border-t border-slate-100">
            <p class="text-[10px] text-center text-slate-400 font-medium">Ferevo Tool • 2026</p>
        </div>
    </div>

    <script>
        // Хранилище для данных, пришедших с сервера
        let currentQR = { png: null, svg: null };

        async function generateQR() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('btn');
            const resultContainer = document.getElementById('resultContainer');
            const qrPreview = document.getElementById('qrPreview');

            if (!url) {
                alert('Пожалуйста, введите адрес');
                return;
            }

            // Визуальный фидбек загрузки
            btn.disabled = true;
            btn.innerText = 'Создаем магию...';
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // Отправляем запрос на наш Express API
                const response = await axios.get('/api/generate', {
                    params: { url: url }
                });

                // Сохраняем данные во временную переменную
                currentQR = response.data;

                // Отображаем PNG в превью
                qrPreview.src = currentQR.png;
                resultContainer.classList.remove('hidden');
                
                // Прокрутка вниз к результату на мобилках
                resultContainer.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error('Ошибка:', error);
                alert('Сервер недоступен. Проверьте консоль Node.js.');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Сгенерировать код';
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function downloadFile(format) {
            const link = document.createElement('a');
            
            if (format === 'png') {
                // Для PNG просто берем base64 строку
                link.href = currentQR.png;
                link.download = `qr-code-${Date.now()}.png`;
            } else if (format === 'svg') {
                // Для SVG создаем Blob из строки XML, которую прислал сервер
                const blob = new Blob([currentQR.svg], { type: 'image/svg+xml' });
                link.href = URL.createObjectURL(blob);
                link.download = `qr-code-${Date.now()}.svg`;
            }

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Позволяем нажимать Enter в поле ввода
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateQR();
        });
    </script>
</body>
</html>
