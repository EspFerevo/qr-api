name: Deploy Node.js QR API

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update files and restart API
        run: |
          # 1. Синхронизируем новые файлы из GitHub в рабочую папку на ВМ
          # Исключаем node_modules, чтобы Docker сам их устанавливал внутри
          rsync -avz --delete --exclude 'node_modules' --exclude '.git' ./ /opt/www/git/qrapi
          
          # 2. Переходим в папку проекта
          cd /opt/www/git/qrapi
          
          # 3. Запускаем/Перезапускаем контейнер. 
          # При рестарте он сам сделает npm install для новых пакетов и подхватит свежий index.js
          docker compose up -d --build
          docker compose restart
