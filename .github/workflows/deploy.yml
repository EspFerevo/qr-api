name: Deploy API to Server

# Запускать скрипт только при пуше в ветку main (или master, проверьте как она у вас называется)
on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Команды, которые робот выполнит на сервере
          script: |
            cd /opt/git/qr-api
            git pull
            docker compose up -d --build
